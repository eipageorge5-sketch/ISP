<!DOCTYPE html>
<html>
<head>
    <title>WiFi Status</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="style.css"> <meta http-equiv="refresh" content="60"> </head>
<body>
    <div class="container">
        <header>
            <div class="logo">Connected<span>!</span></div>
            <p>Enjoy your high-speed internet</p>
        </header>

        <div class="status-box" style="text-align: center; padding: 20px; background: #f0fdf4; border-radius: 15px; border: 1px solid #bbf7d0;">
            <h2 style="color: #166534; font-size: 1.5rem;">Active Session</h2>
            <div class="info" style="margin: 20px 0;">
                <p style="font-size: 0.9rem; opacity: 0.7;">Time Remaining</p>
                <p class="price" style="font-size: 2rem; color: #1e40af;">$(remain-time)</p>
            </div>
            
            <div class="stats" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 0.8rem;">
                <div style="background: white; padding: 10px; border-radius: 10px;">
                    <strong>Down:</strong> $(bytes-out-nice)
                </div>
                <div style="background: white; padding: 10px; border-radius: 10px;">
                    <strong>Up:</strong> $(bytes-in-nice)
                </div>
            </div>
        </div>

        <form action="$(link-logout)" name="logout" style="margin-top: 20px;">
            <button type="submit" class="btn-pay" style="background: #ef4444;">Pause/Disconnect</button>
        </form>

        <footer>
            <p>IP Address: $(ip)</p>
        </footer>
    </div>
</body>
</html>
