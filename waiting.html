<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Processing...</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #1e40af;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container" style="text-align: center;">
        <div class="loader"></div>
        <h2>Checking Payment</h2>
        <p>Please enter your <strong>M-Pesa PIN</strong> on your phone now.</p>
        <p style="font-size: 0.8rem; color: #64748b; margin-top: 15px;">Do not close this page. We will connect you automatically once the transaction is complete.</p>
    </div>
</body>
</html>
