<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connection Error</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" style="text-align: center;">
        <header>
            <div class="logo" style="color: #ef4444;">Oops<span>!</span></div>
            <h2>Something went wrong</h2>
        </header>

        <div class="error-msg" style="background: #fef2f2; color: #991b1b; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #fee2e2;">
            <p>$(error)</p>
        </div>

        <a href="$(link-login)" class="btn-pay" style="display: block; text-decoration: none; margin-bottom: 10px;">Try Again</a>
        
        <a href="https://wa.me/2547XXXXXXXX" class="btn-pay" style="display: block; text-decoration: none; background: #25d366; box-shadow: none;">
            Chat with Support
        </a>

        <footer>
            <p>Error Code: $(error-orig)</p>
        </div>
    </div>
</body>
</html>
